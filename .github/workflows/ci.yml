name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # SQLite is the CLI's dialect and the portable default: the whole suite must
  # pass with zero external services.
  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tesseract (OCR fallback parser)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install the workspace
        run: uv sync --frozen

      - name: Typecheck
        run: uv run mypy

      - name: Test (SQLite)
        # No BOOKSMART_TEST_DATABASE_URL -> conftest defaults to a SQLite file.
        run: uv run pytest -q

  # The same suite against Postgres, so a Postgres-only regression (or a lost
  # pg-ism) cannot land silently.
  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: booksmart
          POSTGRES_PASSWORD: booksmart
          POSTGRES_DB: booksmart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booksmart -d booksmart"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    env:
      BOOKSMART_TEST_DATABASE_URL: postgresql+psycopg://booksmart:booksmart@localhost:5432/booksmart_test

    steps:
      - uses: actions/checkout@v4

      - name: Install tesseract (OCR fallback parser)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install the workspace
        run: uv sync --frozen

      - name: Test (Postgres)
        run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build both distributions
        run: |
          uv build --package booksmart-core
          uv build --package booksmart
