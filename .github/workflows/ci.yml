name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: booksmart
          POSTGRES_PASSWORD: booksmart
          POSTGRES_DB: booksmart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booksmart -d booksmart"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - name: Install tesseract (OCR fallback parser)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest -q

  compose-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/books > /dev/null && exit 0
            sleep 2
          done
          echo "API never became ready"; docker compose logs; exit 1

      - uses: astral-sh/setup-uv@v6

      - name: Generate a test PDF
        run: |
          uv run --no-project --with pymupdf python -c "
          import pymupdf
          doc = pymupdf.open()
          page = doc.new_page()
          page.insert_text((72, 72), 'Compose smoke test book')
          doc.save('smoke.pdf')
          "

      - name: Register book through the API container
        run: |
          BOOK_ID=$(curl -sf -X POST http://localhost:8000/books \
            -F file=@smoke.pdf -F title="Smoke Test" -F author="CI" | jq -r .id)
          test -n "$BOOK_ID"
          echo "BOOK_ID=$BOOK_ID" >> "$GITHUB_ENV"

      - name: Ingest and wait for the worker container to extract
        run: |
          JOB_ID=$(curl -sf -X POST "http://localhost:8000/books/$BOOK_ID/ingest" | jq -r .id)
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "http://localhost:8000/jobs/$JOB_ID" | jq -r .status)
            if [ "$STATUS" = "succeeded" ]; then
              curl -sf "http://localhost:8000/jobs/$JOB_ID" | jq .
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then break; fi
            sleep 2
          done
          echo "ingestion did not succeed"
          curl -s "http://localhost:8000/jobs/$JOB_ID" | jq .
          docker compose logs knowledge-worker
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v
