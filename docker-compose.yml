services:
  knowledge-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      BOOKSMART_DATABASE_URL: postgresql+psycopg://booksmart:booksmart@postgres:5432/booksmart
      BOOKSMART_STORAGE_ROOT: /data/storage
    volumes:
      - ./storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: booksmart
      POSTGRES_PASSWORD: booksmart
      POSTGRES_DB: booksmart
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksmart -d booksmart"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
