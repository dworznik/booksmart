services:
  knowledge-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      BOOKSMART_DATABASE_URL: postgresql+psycopg://booksmart:booksmart@postgres:5432/booksmart
      BOOKSMART_STORAGE_ROOT: /data/storage
    volumes:
      - ./storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  knowledge-worker:
    build: .
    environment:
      BOOKSMART_DATABASE_URL: postgresql+psycopg://booksmart:booksmart@postgres:5432/booksmart
      BOOKSMART_STORAGE_ROOT: /data/storage
      BOOKSMART_LLM_PROVIDER: ${BOOKSMART_LLM_PROVIDER:-anthropic}
      BOOKSMART_LLM_MODEL: ${BOOKSMART_LLM_MODEL:-}
      BOOKSMART_LLM_REASONING_EFFORT: ${BOOKSMART_LLM_REASONING_EFFORT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      BOOKSMART_QDRANT_URL: http://qdrant:6333
      BOOKSMART_EMBEDDING_PROVIDER: ${BOOKSMART_EMBEDDING_PROVIDER:-openai}
      BOOKSMART_EMBEDDING_MODEL: ${BOOKSMART_EMBEDDING_MODEL:-}
    volumes:
      - ./storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: python -m app.worker

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: booksmart
      POSTGRES_PASSWORD: booksmart
      POSTGRES_DB: booksmart
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksmart -d booksmart"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.15.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
